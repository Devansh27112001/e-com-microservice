spring:
  application:
    name: user-service-ecom
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8082

logging:
  level:
    root: info
    com.app.userserviceecom: trace
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7